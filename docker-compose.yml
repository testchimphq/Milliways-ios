services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: milliways
      POSTGRES_USER: milliways
      POSTGRES_PASSWORD: milliways
    ports:
      - "5432:5432"
    volumes:
      - milliways-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milliways -d milliways"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://milliways:milliways@postgres:5432/milliways
      PORT: 3000
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  milliways-postgres:
